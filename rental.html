<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Viaturas de Aluguer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="box">
    <form id="rentalForm">
      <fieldset>
        <legend><b>Formulário de Aluguer de Viatura</b></legend>
        <br>

        <div class="inputRow">
          <div class="inputBox">
            <label for="vehicle">Viatura:</label>
            <select id="vehicle" name="vehicle" required>
              <option value="">Selecionar Viatura</option>
              <option value="1">89-77-XA</option>
              <option value="2">08-AS-84</option>
              <option value="3">56-GH-18</option>
              <option value="4">35-HU-20</option>
              <option value="5">RESERVA</option>
            </select>
          </div>
          <div class="inputBox">
            <label for="customer_name">Nome do Cliente:</label>
            <input type="text" id="customer_name" name="customer_name" required>
          </div>
        </div>

        <div class="inputRow">
          <div class="inputBox">
            <label for="start_date">Data de Início:</label>
            <input type="date" id="start_date" name="start_date" required>
          </div>
          <div class="inputBox">
            <label for="end_date">Data de Fim:</label>
            <input type="date" id="end_date" name="end_date" required>
          </div>
        </div>

        <div class="inputRow">
          <div class="inputBox">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
          </div>
          <div class="inputBox">
            <label for="phone">Telefone:</label>
            <input type="tel" id="phone" name="phone">
          </div>
        </div>

        <div class="inputRow">
          <div class="inputBox">
            <label for="notes">Observações:</label>
            <textarea id="notes" name="notes"></textarea>
          </div>
          <div class="inputBox">
            <label for="color">Cor da Atividade:</label>
            <input type="color" id="color" name="color" value="#4CAF50">
          </div>
        </div>

        <button type="submit">Reservar</button>
        <button type="button" id="deleteBtn" style="display: none; background-color: red; color: white;">Apagar Reserva</button>
      </fieldset>
    </form>
  </div>

  <button onclick="window.location.href='timeline.html'">Ver Disponibilidades</button>
  <button onclick="window.location.href='Menu.html'">Menu</button>

  <script type="module" src="rental.js"></script>
</body>
</html>
